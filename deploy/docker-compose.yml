version: '3.8'
services:
  voice-assistant:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: voice-assistant
    env_file:
      - ../.env
    restart: unless-stopped
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    container_name: caddy-voice
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - voice-assistant

volumes:
  caddy_data:
  caddy_config:
