<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>VoiceAssistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: #888; font-size: 13px; margin-bottom: 16px; }
  #chat { border: 1px solid #ccc3; border-radius: 8px; padding: 12px; height: 50vh; overflow-y: auto; background: #0001; }
  .msg { margin: 8px 0; padding: 10px 14px; border-radius: 14px; max-width: 85%; white-space: pre-wrap; word-wrap: break-word; line-height: 1.35; }
  .user { background: #2563eb; color: white; margin-left: auto; }
  .bot  { background: #6b72801f; }
  .err  { background: #dc2626; color: white; }
  .hint { color: #888; font-size: 12px; text-align: center; margin: 12px 0 4px; }
  #ptt { display: block; width: 100%; padding: 22px; margin: 12px 0 8px; font-size: 18px; font-weight: 600; border: 0; border-radius: 14px; background: #16a34a; color: white; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: none; }
  #ptt:disabled { opacity: 0.55; cursor: wait; }
  #ptt.recording { background: #dc2626; }
  #ptt.processing { background: #6b7280; }
  form { display: flex; gap: 8px; margin-top: 4px; }
  input[type=text] { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid #ccc; font: inherit; }
  button.txt { padding: 10px 14px; border: 0; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; font: inherit; }
  button.txt:disabled { opacity: 0.5; cursor: wait; }
  .status { font-size: 13px; color: #888; margin-top: 8px; min-height: 18px; }
  .level-wrap { display: inline-block; width: 120px; height: 6px; background: #6b72801f; border-radius: 3px; vertical-align: middle; margin-left: 8px; overflow: hidden; }
  .level { display: block; height: 100%; background: #16a34a; width: 0%; transition: width 60ms linear; }
</style>
</head>
<body>
  <h1>🎙️ VoiceAssistant</h1>
  <div class="sub">Удерживай кнопку и говори. Отпустишь — ассистент ответит голосом.</div>

  <div id="chat"></div>

  <button id="ptt" type="button">🎤 Удерживай чтобы говорить</button>

  <form id="form">
    <input id="input" type="text" placeholder="...или напиши текстом" autocomplete="off">
    <button class="txt" id="send" type="submit">Отправить</button>
  </form>
  <div class="status"><span id="status">Готов</span><span class="level-wrap"><span id="level" class="level"></span></span></div>

<script>
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const pttBtn = document.getElementById('ptt');
const statusEl = document.getElementById('status');
const levelEl = document.getElementById('level');
const history = [];

const TARGET_SR = 16000;
const MAX_RECORD_SEC = 20;

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}
function setStatus(t) { statusEl.textContent = t || ''; }

// ---------------- Текстовый чат ----------------
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  input.value = '';
  sendBtn.disabled = true;
  const thinking = addMsg('bot', '...');
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
    });
    const txt = await res.text();
    if (!res.ok) throw new Error(txt || ('HTTP ' + res.status));
    const data = JSON.parse(txt);
    thinking.textContent = data.reply;
    history.push({ role: 'assistant', content: data.reply });
  } catch (err) {
    thinking.className = 'msg err';
    thinking.textContent = 'Ошибка: ' + err.message;
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
});

// ---------------- Аудио-захват ----------------
let audioCtx = null, micStream = null, recorderNode = null, sourceNode = null;
let resampleRatio = 1;
let pcmChunks = [];
let recording = false;
let recordStartTs = 0;
let autoStopTimer = null;

async function startRecording() {
  if (recording) return;
  setStatus('запрашиваю микрофон...');
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
  } catch (e) {
    setStatus('Нет доступа к микрофону');
    addMsg('err', 'Микрофон: ' + e.message);
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
  sourceNode = audioCtx.createMediaStreamSource(micStream);
  recorderNode = audioCtx.createScriptProcessor(4096, 1, 1);
  resampleRatio = audioCtx.sampleRate / TARGET_SR;
  pcmChunks = [];

  recorderNode.onaudioprocess = (e) => {
    const inputBuf = e.inputBuffer.getChannelData(0);

    // level indicator
    let sum = 0;
    for (let i = 0; i < inputBuf.length; i++) sum += inputBuf[i] * inputBuf[i];
    const rms = Math.sqrt(sum / inputBuf.length);
    levelEl.style.width = Math.min(100, rms * 600) + '%';

    // Корректная децимация с усреднением (антиалиасинг box-фильтром).
    const ratio = resampleRatio;
    const outLen = Math.floor(inputBuf.length / ratio);
    const out = new Int16Array(outLen);
    for (let i = 0; i < outLen; i++) {
      const start = Math.floor(i * ratio);
      const end = Math.min(inputBuf.length, Math.floor((i + 1) * ratio));
      let s = 0, n = 0;
      for (let j = start; j < end; j++) { s += inputBuf[j]; n++; }
      const v = n > 0 ? s / n : 0;
      const cl = Math.max(-1, Math.min(1, v));
      out[i] = cl < 0 ? cl * 0x8000 : cl * 0x7fff;
    }
    pcmChunks.push(out);
  };

  sourceNode.connect(recorderNode);
  recorderNode.connect(audioCtx.destination);

  recording = true;
  recordStartTs = performance.now();
  pttBtn.classList.add('recording');
  pttBtn.textContent = '⏹ Отпусти чтобы отправить';
  setStatus('🎤 запись...');

  autoStopTimer = setTimeout(() => {
    if (recording) {
      setStatus('запись остановлена (макс ' + MAX_RECORD_SEC + 'с)');
      stopRecording();
    }
  }, MAX_RECORD_SEC * 1000);
}

async function stopRecording() {
  if (!recording) return;
  recording = false;
  clearTimeout(autoStopTimer);
  pttBtn.classList.remove('recording');
  pttBtn.classList.add('processing');
  pttBtn.textContent = '⏳ обработка...';
  pttBtn.disabled = true;
  levelEl.style.width = '0%';

  const dur = (performance.now() - recordStartTs) / 1000;

  try { recorderNode.disconnect(); } catch {}
  try { sourceNode.disconnect(); } catch {}
  try { micStream.getTracks().forEach(t => t.stop()); } catch {}
  try { await audioCtx.close(); } catch {}
  audioCtx = micStream = recorderNode = sourceNode = null;

  if (dur < 0.4) {
    resetPTT();
    setStatus('Слишком коротко — удерживай дольше');
    return;
  }

  let total = 0;
  for (const c of pcmChunks) total += c.length;
  const pcm = new Int16Array(total);
  let off = 0;
  for (const c of pcmChunks) { pcm.set(c, off); off += c.length; }
  pcmChunks = [];

  await sendVoice(pcm, dur);
  resetPTT();
}

function resetPTT() {
  pttBtn.classList.remove('processing', 'recording');
  pttBtn.textContent = '🎤 Удерживай чтобы говорить';
  pttBtn.disabled = false;
}

async function sendVoice(pcm, dur) {
  setStatus(`⏳ обработка (${dur.toFixed(1)}с аудио)...`);
  const placeholder = addMsg('user', '🎤 …');
  try {
    const res = await fetch('/api/voice', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/octet-stream',
        'X-History': encodeURIComponent(JSON.stringify(history)),
      },
      body: pcm.buffer,
    });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(txt || ('HTTP ' + res.status));
    }
    const recognized = decodeURIComponent(res.headers.get('X-Recognized-Text') || '');
    const reply = decodeURIComponent(res.headers.get('X-Reply-Text') || '');
    const blob = await res.blob();
    placeholder.textContent = '🎤 ' + (recognized || '(пусто)');
    if (recognized) history.push({ role: 'user', content: recognized });
    if (reply) {
      addMsg('bot', reply);
      history.push({ role: 'assistant', content: reply });
    }
    playAudio(blob);
    setStatus('Готов');
  } catch (e) {
    placeholder.className = 'msg err';
    placeholder.textContent = 'Ошибка: ' + e.message;
    setStatus('Готов');
  }
}

// Очередь воспроизведения — каждое аудио играется по очереди
const audioQueue = [];
let playingAudio = null;
function playAudio(blob) {
  audioQueue.push(blob);
  if (!playingAudio) playNext();
}
function playNext() {
  if (audioQueue.length === 0) { playingAudio = null; return; }
  const blob = audioQueue.shift();
  const url = URL.createObjectURL(blob);
  playingAudio = new Audio(url);
  playingAudio.onended = () => { URL.revokeObjectURL(url); playNext(); };
  playingAudio.onerror = () => { URL.revokeObjectURL(url); playNext(); };
  playingAudio.play().catch(() => playNext());
}

// PTT биндинги — pointer events работают и для тача, и для мыши
pttBtn.addEventListener('pointerdown', e => { e.preventDefault(); startRecording(); });
pttBtn.addEventListener('pointerup',   e => { e.preventDefault(); if (recording) stopRecording(); });
pttBtn.addEventListener('pointerleave',e => { if (recording) stopRecording(); });
pttBtn.addEventListener('pointercancel', e => { if (recording) stopRecording(); });

// Spacebar = PTT для десктопа (необязательно)
window.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.activeElement !== input && !recording) {
    e.preventDefault();
    startRecording();
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space' && recording) {
    e.preventDefault();
    stopRecording();
  }
});
</script>
</body>
</html>
